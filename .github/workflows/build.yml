name: contract-go CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:
    inputs:
      dryRun:
        description: 'Dry-Run'
        default: 'true'
        required: false

env:
  # Currently no way to detect automatically
  DEFAULT_BRANCH: main
  GO_VERSION: 1.26.4 # renovate: datasource=golang-version depName=golang
  NODE_VERSION: 25.5.0

jobs:
  branch-name-check:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    steps:
      - name: Validate branch name
        run: |
          BRANCH="${{ github.head_ref }}"
          pattern='^(Feature|Fix|Docs|Refactor|Performance|Test|Chore|CI)/[a-zA-Z0-9._/-]+$'

          if ! echo "$BRANCH" | grep -qE "$pattern"; then
            echo "Invalid branch name: '$BRANCH'"
            echo ""
            echo "Branch names must follow the format: <Type>/<name>"
            echo ""
            echo "Allowed types (case-sensitive):"
            echo "  Feature/<name>     - A new feature"
            echo "  Fix/<name>         - A bug fix"
            echo "  Docs/<name>        - Documentation only changes"
            echo "  Refactor/<name>    - Code changes that neither fix a bug nor add a feature"
            echo "  Performance/<name> - Performance improvements"
            echo "  Test/<name>        - Adding or updating tests"
            echo "  Chore/<name>       - Changes to build process, dependencies, etc."
            echo "  CI/<name>          - CI/CD configuration changes"
            echo ""
            echo "Examples: Feature/add-encryption, Fix/null-pointer, Chore/upgrade-deps"
            exit 1
          fi

          echo "Branch name '$BRANCH' is valid!"

  force-push-check:
    runs-on: ubuntu-latest
    needs: [branch-name-check]
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    steps:
      - name: Check for force push
        run: |
          BEFORE="${{ github.event.before }}"
          ZERO_SHA="0000000000000000000000000000000000000000"

          if [ "$BEFORE" = "$ZERO_SHA" ]; then
            echo "New branch — not a force push. OK."
            exit 0
          fi

          if [ "${{ github.event.forced }}" = "true" ]; then
            echo "FORCE PUSH DETECTED on branch: ${{ github.head_ref }}"
            echo "Force pushes are not allowed. Please rebase and push normally."
            exit 1
          fi

          echo "No force push detected. OK."

  commit-lint:
    needs: [branch-name-check, force-push-check]
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 2

      - name: Validate commit message
        run: |
          pattern='^(feat|fix|docs|perf|revert|chore|refactor|test|build|ci)(\([a-z0-9-]+\))?!?: .{1,}'

          commit_sha="${{ github.event.pull_request.head.sha }}"
          commit_message=$(git log --format=%B -n 1 $commit_sha | head -n 1)
          short_sha=$(echo $commit_sha | cut -c1-7)

          echo "Checking commit: $short_sha"
          echo "Message: $commit_message"
          echo ""

          if ! echo "$commit_message" | grep -qE "$pattern"; then
            echo "Invalid commit message: '$commit_message'"
            echo ""
            echo "Valid format: <type>(<optional-scope>): <description>"
            echo "Allowed types: feat, fix, docs, perf, revert, chore, refactor, test, build, ci"
            echo ""
            echo "Examples:"
            echo "  feat: add new feature"
            echo "  fix(api): resolve null pointer exception"
            echo "  chore!: breaking change in build process"
            exit 1
          fi
          echo "Commit message is valid!"

  verify-commit-signatures:
    needs: [branch-name-check, force-push-check, commit-lint]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify latest commit is signed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Verifying commit signature (latest commit only)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
        
          # Determine which commit to check based on event type
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "Event: Pull Request #${{ github.event.pull_request.number }}"
            COMMIT="${{ github.event.pull_request.head.sha }}"
          elif [ "${{ github.event_name }}" = "push" ]; then
            echo "Event: Push to ${{ github.ref_name }}"
            COMMIT="${{ github.event.after }}"
          else
            echo "Event: ${{ github.event_name }}"
            COMMIT="${{ github.sha }}"
          fi
          
          SHORT_SHA=$(echo $COMMIT | cut -c1-7)
          COMMIT_MSG=$(git log --format=%s -n 1 $COMMIT)
          AUTHOR=$(git log --format='%an <%ae>' -n 1 $COMMIT)
          
          echo "Checking latest commit: $SHORT_SHA"
          echo "   Author: $AUTHOR"
          echo "   Message: $COMMIT_MSG"
          echo ""
          
          # Use GitHub API to check verification status
          VERIFICATION=$(gh api repos/${{ github.repository }}/commits/$COMMIT --jq '.commit.verification')
          VERIFIED=$(echo "$VERIFICATION" | jq -r '.verified')
          REASON=$(echo "$VERIFICATION" | jq -r '.reason')
          
          if [ "$VERIFIED" = "true" ]; then
            echo "Commit is signed and verified!"
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "Latest commit is properly signed and verified!"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          else
            echo "Commit is NOT SIGNED or verification failed"
            echo "   Reason: $REASON"
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "VERIFICATION FAILED!"
            echo ""
            echo "The latest commit ($SHORT_SHA) is not signed."
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            exit 1
          fi

  build:
    needs: [verify-commit-signatures, branch-name-check, force-push-check, commit-lint]
    if: |
      always() &&
      (needs.verify-commit-signatures.result == 'success') &&
      (needs.branch-name-check.result == 'success' || needs.branch-name-check.result == 'skipped') &&
      (needs.force-push-check.result == 'success' || needs.force-push-check.result == 'skipped') &&
      (needs.commit-lint.result == 'success' || needs.commit-lint.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # full checkout for semantic-release
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Cache Go modules
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Run Tests
        run: |
          make tidy
          make test

  release:
    needs: build
    if: github.repository == 'ibm-hyper-protect/contract-go' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Cache Node modules
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install cyclonedx-gomod
        run: |
          go install github.com/CycloneDX/cyclonedx-gomod/cmd/cyclonedx-gomod@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Determine dry run mode
        id: dry_run
        run: |
          dry_run=true
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ github.event.inputs.dryRun }}" != "true" ]]; then
            dry_run=false
          elif [[ "${{ github.ref }}" == "refs/heads/${{ env.DEFAULT_BRANCH }}" ]]; then
            dry_run=false
          elif [[ "${{ github.ref }}" =~ ^refs/heads/v[0-9]+(\.[0-9]+)?$ ]]; then
            dry_run=false
          fi
          echo "dry_run=$dry_run" >> $GITHUB_OUTPUT

      - name: Semantic Release
        run: |
          if [[ "${{ steps.dry_run.outputs.dry_run }}" == "true" ]]; then
            npx -p @semantic-release/changelog \
                -p @semantic-release/git \
                -p @semantic-release/github \
                -p conventional-changelog-conventionalcommits \
                -p semantic-release \
                semantic-release --dry-run
          else
            npx -p @semantic-release/changelog \
                -p @semantic-release/git \
                -p @semantic-release/github \
                -p conventional-changelog-conventionalcommits \
                -p semantic-release \
                semantic-release
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get latest Git tag
        id: get_tag
        if: steps.dry_run.outputs.dry_run == 'false'
        run: |
          tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$tag" ]; then
            echo "No tags found in repository"
            exit 1
          fi
          echo "tag=$tag" >> $GITHUB_OUTPUT

      - name: Generate SBOM
        id: generate_sbom
        if: steps.dry_run.outputs.dry_run == 'false'
        run: |
          sbom_file="contract-go-${{ steps.get_tag.outputs.tag }}.sbom.json"
          cyclonedx-gomod mod -licenses -json -output "$sbom_file"
          echo "sbom_file=$sbom_file" >> $GITHUB_OUTPUT

      - name: Upload SBOM to GitHub Release
        if: steps.dry_run.outputs.dry_run == 'false'
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ steps.generate_sbom.outputs.sbom_file }}
          tag_name: ${{ steps.get_tag.outputs.tag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
