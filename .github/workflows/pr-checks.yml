name: Contract Go - PR Checks

on:
  pull_request:
    branches:
      - main

jobs:
  branch-name-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Validate branch name
        run: |
          BRANCH="${{ github.head_ref }}"
          pattern='^(Feature|Fix|Docs|Refactor|Performance|Test|Chore|CI)/[a-zA-Z0-9._/-]+$'

          if ! echo "$BRANCH" | grep -qE "$pattern"; then
            echo "Invalid branch name: '$BRANCH'"
            echo ""
            echo "Branch names must follow the format: <Type>/<name>"
            echo ""
            echo "Allowed types (case-sensitive):"
            echo "  Feature/<name>     - A new feature"
            echo "  Fix/<name>         - A bug fix"
            echo "  Docs/<name>        - Documentation only changes"
            echo "  Refactor/<name>    - Code changes that neither fix a bug nor add a feature"
            echo "  Performance/<name> - Performance improvements"
            echo "  Test/<name>        - Adding or updating tests"
            echo "  Chore/<name>       - Changes to build process, dependencies, etc."
            echo "  CI/<name>          - CI/CD configuration changes"
            echo ""
            echo "Examples: Feature/add-encryption, Fix/null-pointer, Chore/upgrade-deps"
            exit 1
          fi

          echo "Branch name '$BRANCH' is valid!"

  force-push-check:
    runs-on: ubuntu-latest
    needs: [branch-name-check]
    permissions:
      contents: read
    steps:
      - name: Check for force push
        run: |
          # Renovate legitimately rebases its own PRs — exempt it from this check
          if [ "${{ github.actor }}" = "renovate[bot]" ]; then
            echo "Actor is renovate[bot] — skipping force push check."
            exit 0
          fi

          BEFORE="${{ github.event.before }}"
          ZERO_SHA="0000000000000000000000000000000000000000"

          if [ "$BEFORE" = "$ZERO_SHA" ]; then
            echo "New branch — not a force push. OK."
            exit 0
          fi

          if [ "${{ github.event.forced }}" = "true" ]; then
            echo "FORCE PUSH DETECTED on branch: ${{ github.head_ref }}"
            echo "Force pushes are not allowed. Please rebase and push normally."
            exit 1
          fi

          echo "No force push detected. OK."

  commit-lint:
    runs-on: ubuntu-latest
    needs: [branch-name-check, force-push-check]
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 2

      - name: Validate PR title and latest branch commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          pattern='^(feat|fix|docs|perf|revert|chore|refactor|test|build|ci)(\([a-z0-9-]+\))?!?: .{1,}'
          failed=0

          check_message() {
            local label="$1"
            local msg="$2"
            if ! echo "$msg" | grep -qE "$pattern"; then
              echo "FAIL — $label"
              echo "  Message : $msg"
              echo "  Expected: <type>(<optional-scope>): <description>"
              echo "  Allowed types: feat, fix, docs, perf, revert, chore, refactor, test, build, ci"
              echo ""
              failed=1
            else
              echo "OK   — $label"
              echo "  Message : $msg"
              echo ""
            fi
          }

          pr_number="${{ github.event.pull_request.number }}"

          # 1. Validate the PR title — this becomes the squash commit message on main
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Checking PR title (becomes the squash commit message on main)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          pr_title=$(gh api repos/${{ github.repository }}/pulls/${pr_number} --jq '.title')
          check_message "PR #${pr_number} title" "$pr_title"

          # 2. Validate only the latest commit on the PR branch
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Checking latest branch commit"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          head_sha="${{ github.event.pull_request.head.sha }}"
          head_msg=$(git log --format=%s -n 1 "$head_sha")
          check_message "commit ${head_sha:0:7} (HEAD)" "$head_msg"

          if [ "$failed" = "1" ]; then
            echo "One or more messages failed validation."
            echo ""
            echo "To fix a bad commit message: push a new commit with a valid message."
            echo "Do NOT amend and force-push — force pushes are not allowed on this repo."
            echo ""
            echo "Example:"
            echo "  git commit --allow-empty -m 'fix: correct previous commit intent'"
            echo ""
            echo "Also ensure the PR title follows the same format — it becomes the"
            echo "squash commit message when merged to main."
            exit 1
          fi
          echo "All commit messages are valid!"

  verify-commit-signatures:
    runs-on: ubuntu-latest
    needs: [branch-name-check, force-push-check, commit-lint]
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Verify latest commit is signed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Verifying commit signature (latest commit only)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "Event: Pull Request #${{ github.event.pull_request.number }}"
          COMMIT="${{ github.event.pull_request.head.sha }}"

          SHORT_SHA=$(echo $COMMIT | cut -c1-7)
          COMMIT_MSG=$(git log --format=%s -n 1 $COMMIT)
          AUTHOR=$(git log --format='%an <%ae>' -n 1 $COMMIT)

          echo "Checking latest commit: $SHORT_SHA"
          echo "   Author: $AUTHOR"
          echo "   Message: $COMMIT_MSG"
          echo ""

          VERIFICATION=$(gh api repos/${{ github.repository }}/commits/$COMMIT --jq '.commit.verification')
          VERIFIED=$(echo "$VERIFICATION" | jq -r '.verified')
          REASON=$(echo "$VERIFICATION" | jq -r '.reason')

          if [ "$VERIFIED" = "true" ]; then
            echo "Commit is signed and verified!"
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "Latest commit is properly signed and verified!"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          else
            echo "Commit is NOT SIGNED or verification failed"
            echo "   Reason: $REASON"
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "VERIFICATION FAILED!"
            echo ""
            echo "The latest commit ($SHORT_SHA) is not signed."
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            exit 1
          fi
