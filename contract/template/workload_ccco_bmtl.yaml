type: workload
auths:
  <registry url>:
    password: <password>
    username: <user name>
volumes:
  <volume key>:
    mount: "<data volume mount path>"
    seed: "seed_value_with_minimum_15_characters"
    filesystem: "ext4"
confidential-containers:
  config:
    cosign:
      "<cosigned image>":
        publicKey: <base64 publickey for cosign verification>
  secret:
    verificationKey: "verification public key"
    decryptionKey: "decryption private key"
  regoValidator:
    policy: <base64 encoded policy>
