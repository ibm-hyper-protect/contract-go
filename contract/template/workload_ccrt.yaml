type: workload
auths:
  <registry url>:
    password: <password>
    username: <user name>
# Use either compose or pods
play:
  archive: <base64 TGZ of podman play support files>
compose:
  archive: <base64 TGZ of docker compose support files>
volumes:
  <volume key>:
    mount: "<data volume mount path>"
    seed: "seed_value_with_minimum_15_characters"
    filesystem: "ext4"